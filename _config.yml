title: CuriOS Docs
description: Documentation for CuriOS — A Conversational OS
theme: just-the-docs

url: "https://docs.trycurios.com"
baseurl: "/docs"  # matches the repository name (curi-os/docs → /docs)

markdown: kramdown
highlighter: rouge

# Just the Docs configuration
color_scheme: light
search_enabled: true
heading_anchors: true

plugins:
  - jekyll-seo-tag

# Auxiliary navigation links (shown in the header)
aux_links:
  "GitHub":
    - "https://github.com/curi-os/docs"
aux_links_new_tab: true

# Footer links
footer_content: "CuriOS Documentation &mdash; <a href=\"https://github.com/curi-os/docs\">Contribute on GitHub</a>"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"
